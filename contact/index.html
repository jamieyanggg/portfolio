<!-- CONTACT HERO -->
<section class="contact-hero">
  <h1>Let’s work together.</h1>
  <p>
    Currently open to internships, freelance, and creative collaborations.
  </p>
</section>


<!-- CONTACT CONTENT -->
<section class="contact-container">

  <!-- LEFT SIDE -->
  <div class="contact-info">
    <h2>Get in touch</h2>

    <div class="contact-item">
      <span>Email</span>
      <a href="mailto:your@email.com">jy4474@nyu.edu</a>
    </div>

    <div class="contact-item">
      <span>LinkedIn</span>
      <a href="https://www.linkedin.com/in/jamieyangdesign" target="_blank">linkedin.com/in/jamieyangdesign</a>
    </div>

    <div class="contact-item">
      <span>Resume</span>
      <a href="#">View Resume</a>
    </div>
  </div>


  <!-- RIGHT SIDE (FORM) -->
  <form class="contact-form">

    <div class="form-group">
      <label>Name</label>
      <input type="text" placeholder="Your name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Your email">
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea rows="5" placeholder="Write your message..."></textarea>
    </div>

    <button type="submit">Send Message</button>

  </form>

</section>

</body>
